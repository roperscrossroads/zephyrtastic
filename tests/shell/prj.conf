CONFIG_ZTEST=y

CONFIG_MESHTASTIC=y
CONFIG_MESHTASTIC_NODEDB=y
CONFIG_MESHTASTIC_ADMIN=y
CONFIG_MESHTASTIC_PHONEAPI=y

# The surface under test. The dummy backend lets ztest drive real commands
# through shell_execute_cmd() and read back what they printed.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_DUMMY=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_MESHTASTIC_SHELL=y

CONFIG_MESHTASTIC_SETTINGS=n
CONFIG_MESHTASTIC_BLE=n
CONFIG_MESHTASTIC_SERIAL=n
CONFIG_MESHTASTIC_GNSS=n
CONFIG_MESHTASTIC_DEVICE_METRICS=n
CONFIG_MESHTASTIC_ENVIRONMENT_METRICS=n

CONFIG_MAIN_STACK_SIZE=4096
