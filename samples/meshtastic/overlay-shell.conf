CONFIG_SHELL=y
CONFIG_MESHTASTIC_SHELL=y

CONFIG_LOG_CMDS=y
CONFIG_SETTINGS_SHELL=y

# `hwinfo reset_cause` on demand — live cross-check for the NETLOG boot-time
# reset-cause line (main.c), reachable over telnet without waiting for a reboot.
CONFIG_HWINFO_SHELL=y

# Stack-overflow diagnostics (2026-07-18, stability investigation): STACK_SENTINEL turns a
# stack overflow into a clean, detected fault (visible via our reset-cause diagnostic as
# PANIC) instead of silent corruption of whatever's adjacent in DRAM — plausible unifying
# mechanism for the wedge given ~20 fixed-size thread stacks sized by guesswork, never
# measured. STACK_USAGE lets `kernel stacks` report real per-thread high-water-mark over
# telnet, so any future stack-size trims are evidence-based rather than more guessing.
CONFIG_STACK_SENTINEL=y
CONFIG_STACK_USAGE=y

# GNSS shell commands require overlay-gnss.conf as well.

# Shell backend thread — doubled from 2048 (was 84% under load, incl. printing the thread table).
CONFIG_SHELL_STACK_SIZE=4096
