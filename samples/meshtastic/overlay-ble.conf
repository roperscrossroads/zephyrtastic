CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MESHTASTIC_THREAD_STACK_SIZE=8192

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="Zephyr Meshtastic"
CONFIG_BT_ATT_PREPARE_COUNT=4
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
CONFIG_MESHTASTIC_BLE=y
CONFIG_MESHTASTIC_BLE_PAIRING=y
# # Meshtastic app pairs before reading config; use official default PIN 123456.
# CONFIG_MESHTASTIC_BLE_FIXED_PASSKEY=y
# CONFIG_MESHTASTIC_BLE_PASSKEY=123456

CONFIG_BT_SMP=y
CONFIG_BT_SMP_ENFORCE_MITM=y
# Official Meshtastic zephyr port: allow legacy fallback if SC-only aborts pairing.
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_SECURITY_ERR_TO_STR=y

CONFIG_BT_SETTINGS=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
