# V4 PSRAM enable (ESP32-S3R2 = 2 MB quad SPI RAM). Adds PSRAM as a shared-multi-heap
# region + relocates BSS off internal DRAM, to relieve the tight internal-RAM pressure
# that makes our V4 unstable. Upstream Meshtastic does the equivalent on BOARD_HAS_PSRAM
# boards via heap_caps_malloc_extmem_enable(2048) — our Zephyr port never enabled it.
#
# Opt-in: PSRAM=1 (V4 ONLY — V3/S3FN8 has no PSRAM). ESP_SPIRAM is auto-off in MCUboot.
# Speed 40M for safe first bring-up (bump to 80M once proven). If boot fails, the OTA
# dry-run auto-reverts.
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_QUAD=y
CONFIG_SPIRAM_TYPE_ESPPSRAM16=y
CONFIG_SPIRAM_SPEED_40M=y
