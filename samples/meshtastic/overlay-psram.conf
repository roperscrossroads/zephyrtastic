# V4 PSRAM enable (ESP32-S3R2 = 2 MB quad SPI RAM). Hardware-verified ("Found 2MB
# PSRAM @ 40MHz"). Opt-in: PSRAM=1 (V4 ONLY — V3/S3FN8 has no PSRAM). ESP_SPIRAM is
# auto-off in MCUboot. Speed 40M for safe first bring-up (bump to 80M once proven).
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_QUAD=y
CONFIG_SPIRAM_TYPE_ESPPSRAM16=y
CONFIG_SPIRAM_SPEED_40M=y

# --- 2026-07-17: WiFi-heap-to-PSRAM routing — TWO BENCH-VERIFIED FAILURES ---
# This overlay only initializes PSRAM; it does NOT route any allocator into it, so
# WiFi (the dominant dynamic consumer on this net build) still draws from internal
# DRAM exactly as before PSRAM existed — confirmed by reading esp_heap_adapter.h and
# by dram0_0_seg barely moving in the build report. That's real and still true. BUT:
# do not "fix" it by adding these Kconfigs without further investigation — both
# combinations tried below broke WiFi entirely on hardware (esp_wifi_init() fails at
# boot with "Not enough memory to initialize Wi-Fi (0x3001)", net_if never ready;
# LoRa mesh + the rest of the app kept running fine — it's WiFi-specific, not a
# general crash). Both times MCUboot's swap-using-move safety net correctly reverted
# the unconfirmed image on next reset (tools/ota.sh dry-run behavior working exactly
# as designed).
#
#   Attempt 1: CONFIG_ESP_WIFI_HEAP_SPIRAM=y (redirects EVERY
#   esp_wifi_malloc_func/os_wpa_malloc_func call to shared_multi_heap_aligned_alloc,
#   per esp_heap_adapter.h) + CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM=y + STATIC_TX_BUFFER.
#   FAILED. Ruled out an init-order race: esp_psram_smh_init() runs unconditionally in
#   __esp_platform_app_start(), BEFORE z_prep_c() boots the kernel — PSRAM/shared_
#   multi_heap is registered long before any driver init runs, and no "Failed to
#   initialize PSRAM shared multi heap" was logged. Suspected: some of esp_wifi_init()'s
#   internal allocations need DMA-capable/internal RAM the WiFi hardware can't source
#   from the external SMH region (a known ESP-IDF-family constraint).
#
#   Attempt 2: dropped ESP_WIFI_HEAP_SPIRAM, kept CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM=y
#   (a LINK-TIME relocation — see the #ifdef CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM
#   sections in soc/espressif/esp32s3/default.ld, NOT a runtime allocator) + STATIC_TX_
#   BUFFER. IDENTICAL failure. This exonerates ESP_WIFI_HEAP_SPIRAM as the sole cause —
#   the culprit is NET_ALLOC_SPIRAM and/or STATIC_TX_BUFFER (untested in isolation from
#   each other). One plausible read: switching Dynamic->Static TX buffers alone raises
#   esp_wifi_init()'s upfront allocation demand (16 buffers pre-allocated at init vs
#   on-demand), and on this tight-DRAM board that alone may be enough to blow the WiFi
#   heap pool — independent of where NET_ALLOC_SPIRAM's linker relocation points.
#
# Next step for whoever picks this up: bisect the two Kconfigs independently (each
# alone, neither combined with the other) before touching WiFi's SPIRAM knobs again.
# If that doesn't pan out, the safer path is app-level: route nodedb/packet-pool
# allocations to PSRAM explicitly (ESP_SPIRAM_BSS_RELOC_LIBS_AND_OBJS or
# shared_multi_heap_alloc(SMH_REG_ATTR_EXTERNAL, ...) in meshtastic-zephyr code)
# instead of touching the WiFi driver's own memory model at all.

# --- 2026-07-17: app-level relocation (the safer path from the note above) — LANDED ---
# meshtastic_nodedb.c alone is 33.5 KB of internal DRAM (ram_report: nodedb_entries 12800 B
# + warm_keys [nodedb's cached public-key store] 20480 B, both .dram0.bss) — pure application
# data, no DMA/hardware exposure, no WiFi/net-buffer entanglement. This is exactly what
# upstream Meshtastic already does (nodedb -> PSRAM on BOARD_HAS_PSRAM). Does NOT touch
# esp_wifi_init() or any driver allocator, so it doesn't hit the WiFi failure mode above.
#
# Tried CONFIG_ESP_SPIRAM_BSS_RELOC_LIBS_AND_OBJS first (both "meshtastic_nodedb.c.obj" and
# "libmeshtastic.a:meshtastic_nodedb.c.obj") — verified via nm on the built ELF that NEITHER
# actually relocated anything (addresses unchanged, dram0_0_seg unchanged). Root cause: the
# CMakeLists.txt template hard-codes "*${obj}:(.bss .bss.*)" — GNU ld archive-wildcard syntax,
# which only matches an entire .a archive's members (see the real working example in
# samples/net/openthread/border_router/overlay-ot-rcp-host-wifi-esp.conf: whole libopenthread
# archive names). It does NOT support picking one .o out of a shared archive. The whole
# libmeshtastic.a is ~111 KB — nearly all of .dram0.bss, including meshtastic_radio.c
# (SPI/DMA-adjacent, the LoRa radio driver glue) and meshtastic_tcp.c (net-buffer-adjacent,
# the PhoneAPI TCP server) — the same risk categories that broke WiFi twice already. Too broad.
#
# Landed instead: EXT_RAM_BSS_ATTR (modules/hal/espressif/.../esp_attr.h) applied directly to
# the two declarations in src/meshtastic_nodedb.c. It's a per-variable GCC section attribute
# (`.ext_ram.bss`, matched unconditionally by default.ld's `*(.ext_ram.bss*)`) gated on
# CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY (already on by default once ESP_SPIRAM=y) — no
# archive-matching footgun, and it expands to nothing on V3 (no PSRAM), so the same source is
# safe on both boards. Verified via nm: both symbols moved into the ext_ram address range.

# --- 2026-07-20: two more app-level relocations + AES tables to flash ---
# Same EXT_RAM_BSS_ATTR technique extended to two more app-owned, CPU-only structs, moving
# the guarded macro into a shared header src/meshtastic_ext_ram.h (nodedb.c/mqtt.c/
# config_store.c all include it now):
#   - mqtt_ctx (~11.8 KB, src/meshtastic_mqtt.c) — MQTT client context: rx/tx buffers +
#     publish queue. CPU-only; the socket layer memcpys between these and the (internal,
#     DMA) net_buf pool, so nothing DMAs from PSRAM. Its embedded k_mutex is fine — mutexes
#     are thread-context only, never touched from an ISR (the flash-write cache-disable
#     window that makes PSRAM unreadable only bites ISR/flash-adjacent data).
#   - store (~9.2 KB, src/meshtastic_config_store.c) — the config record store. Safe despite
#     being NVS-backed because each record is pb_encoded into a LOCAL internal-RAM buffer
#     before the flash write; the flash write never reads the PSRAM struct directly.
#
# GOTCHA (cost one build cycle): EXT_RAM_BSS_ATTR must sit AFTER the declarator for a variable
# with an ANONYMOUS struct type — `} var ATTR;`. Placed after the struct's closing brace
# (`} ATTR var;`) it binds to the TYPE, is silently ignored (no warning), and the var stays in
# internal DRAM. The nodedb arrays use named types so `static ATTR struct T x[]` was fine.
# Always confirm with `nm zephyr.elf | grep <sym>` → 0x3c0.….
#
# Result (V4 net-ota-ui, display+MQTT): dram0_0_seg 96.62% -> 88.80%. mqtt_ctx+store = ~21 KB
# to PSRAM; the AES ROM-tables switch (overlay-net.conf, CONFIG_MBEDTLS_AES_ROM_TABLES=y) moved
# a further ~8.75 KB of AES T-tables from .dram0.bss to flash — that one helps V3 too
# (95.46% -> 93.16%), since V3 has no PSRAM to relocate into.
