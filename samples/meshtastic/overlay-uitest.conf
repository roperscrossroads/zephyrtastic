# UI-test slimming overlay — layer LAST, after the net+ota+display chain.
#
# The full net+MQTT+TLS+display image lands at ~98% internal DRAM on the V4 with
# PSRAM left disabled (this chain omits overlay-psram.conf) — too tight to trust
# on a remote node. This keeps everything needed
# to reach the node and see the on-device UI — WiFi + auto-connect + telnet
# shell + OTA (mcumgr) + the CFB display — and drops the DRAM-heavy features
# that a UI demo does not need. Networking/WiFi base come from overlay-wifi-shell
# (NETWORKING/IPV4/DHCPV4/WIFI) and overlay-net (WIFI_AUTOCONNECT), so those
# survive; only the MQTT/TLS/GNSS layers are removed.

# Drop the Meshtastic MQTT bridge (frees a 12 KB thread + ~9 KB publish queue).
CONFIG_MESHTASTIC_MQTT=n
CONFIG_MQTT_LIB=n

# Drop the MQTT-over-TLS socket layer. mbedTLS core stays enabled for PKI/PSA.
CONFIG_MESHTASTIC_MQTT_TLS=n
CONFIG_MQTT_LIB_TLS=n
CONFIG_NET_SOCKETS_SOCKOPT_TLS=n
CONFIG_TLS_CREDENTIALS=n

# Drop GNSS (no position fix needed for a UI demo).
CONFIG_MESHTASTIC_GNSS=n
CONFIG_GNSS=n
CONFIG_MESHTASTIC_MQTT_MAP_REPORT=n

# Trim net buffers: MQTT-TCP throughput sizing is overkill for OTA + telnet.
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
