# NodeDB sizing for boards WITHOUT PSRAM (V3, V4-R8-if-no-PSRAM) — appended LAST by the
# justfile whenever PSRAM!=1, so it overrides overlay-net.conf's shared default.
#
# 2026-07-18 (stability investigation): overlay-net.conf sizes NodeDB at 128 nodes +
# 512 warm keys for ALL boards, on the assumption PSRAM absorbs the cost — true on V4
# (both tables relocated via EXT_RAM_BSS_ATTR, ~33 KB moved off internal DRAM entirely).
# A board with no PSRAM has nowhere to put that 33 KB, so it was silently paying the full
# internal-DRAM cost with no offset — confirmed via `nm -S --size-sort` on V3's own ELF
# (nodedb_entries + warm_keys both at 0x3fc... = internal DRAM, not 0x3c0... = PSRAM).
#
# 4x cut (matches the "~4x the mesh" sizing language already in the shared overlay's own
# comment) — operator call based on tonight's logs showing a few dozen distinct nodes
# heard at once, not hundreds. Reclaims ~24 KB of V3's internal DRAM.
CONFIG_MESHTASTIC_NODEDB_MAX_NODES=32
CONFIG_MESHTASTIC_NODEDB_WARM_KEYS=128
