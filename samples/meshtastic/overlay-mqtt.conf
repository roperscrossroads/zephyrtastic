# MQTT gateway overlay for boards with IPv4 networking (Wi-Fi, Ethernet, etc.)
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_NET_MGMT_EVENT=y

CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=n

CONFIG_MESHTASTIC_MQTT=y
CONFIG_MESHTASTIC_MQTT_UPLINK_ENABLED=y
CONFIG_MESHTASTIC_MQTT_DOWNLINK_ENABLED=y
CONFIG_MESHTASTIC_MQTT_ENCRYPTION_ENABLED=y
CONFIG_MESHTASTIC_MQTT_ROOT="msh/EU_868"

CONFIG_MESHTASTIC_MQTT_THREAD_STACK_SIZE=12288
CONFIG_MESHTASTIC_MQTT_THREAD_PRIORITY=10

# Offline publish queue: 8 slots (was default 32). Each slot is ~1.15 KB
# (topic[128]+payload[TX_BUFFER]); 8 keeps the burst backlog small in RAM.
CONFIG_MESHTASTIC_MQTT_PUBLISH_QUEUE_SIZE=8

# LoRa async RX/TX completion is handled through the system workqueue. Keep
# enough stack headroom in Wi-Fi/MQTT builds so SX126x DIO1 work can complete
# reliably while the network stack is active.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# MQTT runs over TCP; each segment can be ~1280 bytes. The Wi-Fi shell overlay
# defaults (10 pkt / 20 buf) are too small and cause TCP retransmit ENOBUFS.
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=24
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# Optional: publish to the public Meshtastic map (requires GNSS fix)
CONFIG_GNSS=y
CONFIG_MESHTASTIC_MQTT_MAP_REPORT=y
CONFIG_MESHTASTIC_GNSS=y
