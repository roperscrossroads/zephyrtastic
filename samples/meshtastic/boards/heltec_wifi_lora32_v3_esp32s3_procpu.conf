# Heltec WiFi LoRa 32 (V3) — ESP32-S3 + on-board Semtech SX1262
# Board target: heltec_wifi_lora32_v3/esp32s3/procpu
#
# The upstream Zephyr board already declares a fully-wired `lora0` (sx1262)
# node, so no radio devicetree overlay is needed — only board-appropriate
# feature tuning lives here. (An optional overlay in this directory enables
# the on-die temperature sensor for device metrics.)

# The V3's SX1262 supports up to +22 dBm. 20 dBm is a common safe default;
# choose per your region and antenna. (Stack default is 17 dBm.)
CONFIG_MESHTASTIC_TX_POWER=20

# NOTE: the V3 has NO fuel-gauge IC — battery voltage is read via a plain ADC
# divider (VBAT sense enabled on GPIO37, measured on GPIO1), not a `fuel_gauge0`
# device. So CONFIG_MESHTASTIC_FUEL_GAUGE is intentionally left OFF; uptime and
# airtime/channel-utilization device metrics still work without it.

# The board overlay uses a gpio-hog to drive Vext (GPIO36) ON at boot, matching
# the reference firmware. This auto-enables from the DT, but set it explicitly.
CONFIG_GPIO_HOGS=y

# Admin "shutdown" support: the ESP32-S3 has HAS_POWEROFF, so sys_poweroff()
# enters deep sleep (wakes on reset). Enables canShutdown in device metadata.
CONFIG_POWEROFF=y
