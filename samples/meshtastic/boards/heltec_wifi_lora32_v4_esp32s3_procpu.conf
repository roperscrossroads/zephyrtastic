# Heltec WiFi LoRa 32 (V4) — ESP32-S3 + SX1262 behind a GC1109/KCT8103L FEM.
# Board target: heltec_wifi_lora32_v4/esp32s3/procpu — ONE image; the board's
# FEM init (heltec_wifi_lora32_v4_fem.c) auto-detects GC1109 vs KCT8103L at boot,
# so there is no revision to pick. (For the 8MB octal-PSRAM board use the
# separate heltec_wifi_lora32_v4_r8 target.)
#
# The local board port wires the radio, OLED, VBAT and GPS; only board-
# appropriate feature tuning lives here.

# The V4's FEM raises max output well above the bare SX1262's +22 dBm. Start
# CONSERVATIVE: the driver commands the SX1262 output, then the FEM adds ~+7 to
# +11 dB on top (non-linear, see variant.h). 20 dBm at the chip already means
# high-20s dBm at the antenna — set per region/antenna and VERIFY on the bench.
CONFIG_MESHTASTIC_TX_POWER=20

# No fuel-gauge IC (battery is a plain ADC divider), same as V3.

# FEM power/enable + GPS control use gpio-hogs from the board DT.
CONFIG_GPIO_HOGS=y
