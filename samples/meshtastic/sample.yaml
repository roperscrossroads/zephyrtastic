sample:
  name: Meshtastic
  description: >
    Demonstrates the Meshtastic mesh radio stack: initialises the default
    LongFast channel, prints received text messages, and broadcasts a
    greeting every 30 seconds.
common:
  build_only: true
  integration_platforms:
    - twatch_s3/esp32s3/procpu
    - heltec_wifi_lora32_v3/esp32s3/procpu
    - arduino_giga_r1/stm32h747xx/m7
tests:
  sample.meshtastic:
    tags:
      - lora
      - meshtastic
    platform_allow:
      - twatch_s3/esp32s3/procpu
      - heltec_wifi_lora32_v3/esp32s3/procpu
      - arduino_giga_r1/stm32h747xx/m7
    extra_args:
      - platform:arduino_giga_r1/stm32h747xx/m7:SHIELD=semtech_sx1262mb2das
  sample.meshtastic.settings:
    tags:
      - lora
      - meshtastic
      - settings
    platform_allow:
      - twatch_s3/esp32s3/procpu
      - heltec_wifi_lora32_v3/esp32s3/procpu
      - arduino_giga_r1/stm32h747xx/m7
    extra_args:
      - platform:arduino_giga_r1/stm32h747xx/m7:SHIELD=semtech_sx1262mb2das
      - EXTRA_CONF_FILE=overlay-settings.conf
  sample.meshtastic.net:
    # WiFi/Net variant: telnet shell-over-IP, MQTT-over-TLS bridge, WiFi boot
    # auto-connect, and the TCP:4403 PhoneAPI transport. Uses the generic
    # overlay-net.conf (no site-specific broker/SSID) so the target is
    # publishable/upstreamable. WiFi-only, so heltec (esp32s3) alone.
    tags:
      - lora
      - meshtastic
      - net
      - wifi
      - mqtt
    platform_allow:
      - heltec_wifi_lora32_v3/esp32s3/procpu
    extra_args:
      - "EXTRA_CONF_FILE=overlay-shell.conf;overlay-wifi-shell.conf;overlay-mqtt.conf;overlay-net.conf"
