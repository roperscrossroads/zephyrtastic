# Plaintext-MQTT delta — drop the mbedTLS SSL/TLS data path to reclaim DRAM, KEEP the
# PSA crypto primitives that Meshtastic PKC needs (X25519 + AES-CCM + SHA-256). Opt-in:
# chained LAST by the justfile when MQTTPLAIN=1, so it overrides overlay-net.conf's
# TLS block. MQTT then talks plaintext to broker :1883.
#
# ⚠ A TLS-only public broker (e.g. mqtt.example.org) will have :1883 closed — a plaintext
# node will NOT bridge to it. Point at an internal/plaintext broker, or this is
# DRAM-measurement only.
#
# Point at your plaintext broker by raw IP (the RFC5737 placeholder below is not a real
# host). Anonymous by default — no auth required; username/password stay at their (unused)
# Kconfig defaults. Use a raw IP, not a DNS name: the node's DNS is hardcoded to public
# 8.8.8.8 (overlay-net.conf) and can't resolve an internal-only hostname (a name there
# fails live with `MQTT broker resolve failed (-4 EAI_FAIL)`). Override it in a local,
# gitignored file (prj-local.conf / *-local.conf) with your real broker.
CONFIG_MESHTASTIC_MQTT_BROKER_HOST="192.0.2.10"

CONFIG_MESHTASTIC_MQTT_BROKER_PORT=1883
CONFIG_MESHTASTIC_MQTT_TLS=n
CONFIG_MESHTASTIC_MQTT_TLS_NO_VERIFY=n
CONFIG_MQTT_LIB_TLS=n
CONFIG_NET_SOCKETS_SOCKOPT_TLS=n
CONFIG_TLS_CREDENTIALS=n

# --- drop the mbedTLS SSL/X509 layer (TLS-only; PKC uses PSA crypto, not SSL) ---
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=n
CONFIG_MBEDTLS_X509_CRT_PARSE_C=n
CONFIG_MBEDTLS_PEM_PARSE_C=n
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=n

# --- TLS-cert crypto that PKC does NOT use (PKC = X25519 + AES-CCM + SHA-256 only) ---
CONFIG_PSA_WANT_ALG_ECDSA=n
CONFIG_PSA_WANT_ALG_RSA_PKCS1V15_SIGN=n
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=n
CONFIG_PSA_WANT_ALG_GCM=n
CONFIG_PSA_WANT_ALG_SHA_384=n
CONFIG_PSA_WANT_ECC_SECP_R1_256=n
CONFIG_PSA_WANT_ECC_SECP_R1_384=n
CONFIG_PSA_WANT_ALG_TLS12_PRF=n
