# Generic NET-variant feature overlay — for build-test / CI and as the public,
# upstreamable base. Chained after:
#   overlay-shell.conf ; overlay-wifi-shell.conf ; overlay-mqtt.conf
#
# Enables the full WiFi/Net feature set — telnet shell-over-IP (port 23),
# MQTT-over-TLS (peer verification OFF: encrypted but broker NOT authenticated,
# MITM-able), WiFi boot auto-connect from stored NVS credentials, and the
# TCP:4403 PhoneAPI transport (lights up the AdminMessage config-write engine).
#
# Deliberately carries NO site-specific values: no broker host, no TLS hostname,
# no WiFi SSID/PSK. Those are runtime NVS / private-input build config (injected
# from a secret or set on-device), never baked into a published binary.

# --- Shell over IP: telnet backend, port 23 ---
CONFIG_SHELL_BACKEND_TELNET=y

# --- Meshtastic MQTT bridge: US region (broker host/port left to Kconfig
#     defaults; supplied at runtime / via private build input, not baked in) ---
CONFIG_MESHTASTIC_MQTT_ROOT="msh/US"

# --- No GNSS hardware on this variant: disable map-report + GNSS ---
CONFIG_MESHTASTIC_MQTT_MAP_REPORT=n
CONFIG_MESHTASTIC_GNSS=n
CONFIG_GNSS=n

# --- Static public DNS (generic; some networks don't hand out DHCP option 6) ---
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"

# --- MQTT over TLS. Peer verification OFF (see NO_VERIFY below): encrypted but
#     the broker cert is not authenticated. The PSA_WANT_* block is the
#     scaffolding to turn full ECDSA verification back on once the chain-parse
#     issue is resolved (pin the ECDSA intermediate). ---
CONFIG_MESHTASTIC_MQTT_TLS=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_RSA_PKCS1V15_SIGN=y
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_SHA_384=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_DERIVE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ECC_MONTGOMERY_255=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_ECC_SECP_R1_384=y
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MESHTASTIC_MQTT_TLS_NO_VERIFY=y
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_ALG_TLS12_PRF=y
CONFIG_ZVFS_POLL_MAX=8
CONFIG_NET_MAX_CONN=8

# --- Automatic WiFi at boot from stored NVS credentials. The PSK never enters
#     the firmware image; provision once on-device with `wifi cred add`. ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_WIFI_CREDENTIALS_CONNECT_STORED=y
CONFIG_WIFI_CREDENTIALS_SHELL=y
CONFIG_MESHTASTIC_WIFI_AUTOCONNECT=y

# --- App/CLI over IP: Meshtastic PhoneAPI over TCP:4403 (StreamAPI framing). ---
CONFIG_MESHTASTIC_TCP=y
CONFIG_NET_TCP_KEEPALIVE=y

# --- Wall-clock via SNTP (no GNSS/RTC on this board). Seeds meshtastic_clock on
#     every IPv4 lease. Default server pool.ntp.org needs working DNS; override
#     MESHTASTIC_SNTP_SERVER to a numeric IP on DNS-blocked networks. ---
CONFIG_MESHTASTIC_SNTP=y

# --- PKC (X25519 + AES-CCM) for direct messages. Reuses the PSA ECC/AES/SHA
#     already pulled in by the TLS block above; adds CCM. ---
CONFIG_PSA_WANT_ALG_CCM=y
CONFIG_MESHTASTIC_PKI=y
