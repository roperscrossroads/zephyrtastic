# MCUboot image config for the Heltec V3.
#
# The board defconfig forces POWER_DOMAIN(_GPIO)=y for the Vext rail, so the GPIO
# power-domain driver compiles into the MCUboot image too — but it calls
# k_can_yield(), which the single-threaded MCUboot build doesn't provide, so the
# bootloader fails to link. MCUboot never drives Vext (no LoRa/OLED), so disable
# the power domain for the bootloader image only; the application image keeps it.
# Disabling the POWER_DOMAIN subsystem is enough — the gpio power-domain driver
# is gated on it, so power_domain_gpio.c is never compiled into MCUboot. (We do
# NOT also set POWER_DOMAIN_GPIO=n: the board defconfig force-defaults it y and
# the override would just warn; it's inert with the subsystem off.)
CONFIG_POWER_DOMAIN=n

# Quieter bootloader console (warnings+).
CONFIG_MCUBOOT_LOG_LEVEL_WRN=y
