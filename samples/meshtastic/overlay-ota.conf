# --- OTA firmware update over SMP/UDP (mcumgr) ---
# Chained after the net chain. Requires the MCUboot A/B build (SYSBUILD=1) — the
# port gate MESHTASTIC_OTA `depends on BOOTLOADER_MCUBOOT`. net variant only.
#
# MESHTASTIC_OTA selects the mcumgr/img_mgmt/os_mgmt/DFU pieces; the knobs below
# are the tuning/trims that keep it inside the net variant's tight DRAM budget.
CONFIG_MESHTASTIC_OTA=y

# Transport: SMP over UDP, IPv4 only (drops a whole listener thread + v6 buffers).
CONFIG_MCUMGR_TRANSPORT_UDP_IPV4=y
CONFIG_MCUMGR_TRANSPORT_UDP_IPV6=n
CONFIG_MCUMGR_TRANSPORT_UDP_PORT=1337

# MCUboot image manager backend for img_mgmt (slot1 write / test / confirm).
CONFIG_MCUBOOT_IMG_MANAGER=y

# DRAM trims (see plan budget). MTU/netbuf 1024 keeps upload chunks small;
# erase-progressively wipes slot1 as we stream rather than all up front.
CONFIG_MCUMGR_TRANSPORT_NETBUF_COUNT=2
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=1024
CONFIG_MCUMGR_TRANSPORT_UDP_MTU=1024
CONFIG_IMG_ERASE_PROGRESSIVELY=y
