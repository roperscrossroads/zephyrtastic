# On-device CFB screen UI (prototype). Target: Heltec WiFi LoRa 32 V4, whose
# board devicetree already wires a 128x64 SSD1306 OLED as chosen zephyr,display.
#
#   west build -b heltec_wifi_lora32_v4/esp32s3/procpu samples/meshtastic \
#       -- -DEXTRA_CONF_FILE=overlay-display.conf
#
# MESHTASTIC_DISPLAY `select`s DISPLAY + CHARACTER_FRAMEBUFFER; the SSD1306
# driver auto-enables from the DT node. The lines below are redundant with those
# selects but spelled out so the display stack is obvious at a glance.
CONFIG_MESHTASTIC_DISPLAY=y

CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_CHARACTER_FRAMEBUFFER=y

# Button navigation: MESHTASTIC_DISPLAY_BUTTON `select`s INPUT; the gpio-keys
# driver auto-enables from the board's sw0 node. Spelled out for clarity.
CONFIG_INPUT=y

# The node-list page reads names/SNR/hops from these (both default y already).
CONFIG_MESHTASTIC_NODEDB=y
CONFIG_MESHTASTIC_NODEINFO=y
