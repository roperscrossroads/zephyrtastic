# Disable the Meshtastic MQTT bridge entirely — no broker client, no MQTT thread, no
# MQTT-over-TLS. Layer LAST so it overrides overlay-mqtt / overlay-mqtt-plain / the
# gitignored overlay-net-local's MQTT settings. Unlike overlay-uitest, this drops ONLY the
# MQTT bridge (keeps GNSS + full net buffers + PhoneAPI) — for a node that shouldn't bridge
# to a broker. PSA crypto stays on for PKC (MESHTASTIC_PKI), so DMs still work.
CONFIG_MESHTASTIC_MQTT=n
CONFIG_MQTT_LIB=n
CONFIG_MESHTASTIC_MQTT_TLS=n
CONFIG_MQTT_LIB_TLS=n
CONFIG_MESHTASTIC_MQTT_MAP_REPORT=n
