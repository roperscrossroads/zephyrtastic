# Sysbuild: build MCUboot as a sub-image so the app boots A/B from slot0/slot1.
# The Heltec V3 board defaults BOOT_SIGNATURE_TYPE_NONE.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# --- Upgrade mode: REAL A/B rollback (swap-using-move) ---
# The sysbuild MCUBOOT_MODE choice resolved to OVERWRITE_ONLY on this workspace
# (despite the upstream "SWAP_USING_MOVE if SOC_FAMILY_ESPRESSIF_ESP32" default),
# which gives NO rollback: a bad OTA overwrites the good image and unconfirmed
# resets never revert. Select swap-using-move EXPLICITLY here — this is the layer
# that actually drives it: sysbuild force-generates the mcuboot image .config
# (CONFIG_BOOT_SWAP_USING_MOVE=y) AND the imgtool args (drops --overwrite-only,
# reserves the swap trailer). Image-level (sysbuild/mcuboot.conf) cannot override
# this — sysbuild forces it via FORCED_CONF_FILE. Needs no scratch partition;
# BOOT_MAX_IMG_SECTORS_AUTO derives the sector count from the slot size.
SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
