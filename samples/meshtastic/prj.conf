CONFIG_HWINFO=y
CONFIG_LORA_MODULE_BACKEND_NATIVE=y
CONFIG_LORA_LOG_LEVEL_DBG=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
# Deferred-log ring buffer (DRAM). 1024 is the Zephyr default; the old 4096 was
# generous for a mesh node. Under a heavy log burst the deferred backend drops
# messages (bumping a dropped counter) rather than blocking — bump back toward
# 2048 if `log stats` shows drops that matter.
CONFIG_LOG_BUFFER_SIZE=1024
# The deferred log-processing thread formats each message on its own stack; the
# Zephyr default (~1 KB) is too tight for meshtastic's larger messages and
# overflowed the log thread at network-up on the V3. Give it modest headroom.
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

CONFIG_MAIN_STACK_SIZE=8192

CONFIG_MESHTASTIC=y
CONFIG_MESHTASTIC_SETTINGS=y
CONFIG_MESHTASTIC_LOG_LEVEL_DBG=y
# Packet hex dumps stay OFF (MESHTASTIC_PACKET_HEXDUMP): dumping a full ~256-byte
# packet per TX/RX is the deepest formatter on the log path and can overflow the
# log-thread stack. Enable it (and raise CONFIG_LOG_PROCESS_THREAD_STACK_SIZE)
# only for wire-level debugging.

# for persistent settings
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# MCUboot A/B: build the app as a signed slot0 image (zephyr.signed.bin) under
# sysbuild. Inert unless the build is invoked with --sysbuild (SYSBUILD=1 in the
# justfile); harmless for every variant, so it lives here rather than an overlay.
CONFIG_BOOTLOADER_MCUBOOT=y
 # for delayed settings save in system work queue
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Regulatory: the region this device transmits in. 1 = US (902-928 MHz).
# Determines the LoRa frequency and the TX power ceiling. Override in a
# gitignored *-local.conf for a device operating elsewhere — transmitting
# outside your allocation is illegal in most jurisdictions and the firmware
# cannot detect that for you. See MESHTASTIC_DEFAULT_REGION in src/Kconfig.core
# for the full code list.
CONFIG_MESHTASTIC_DEFAULT_REGION=1
