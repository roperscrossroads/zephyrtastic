CONFIG_HWINFO=y
CONFIG_LORA_MODULE_BACKEND_NATIVE=y
CONFIG_LORA_LOG_LEVEL_DBG=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096

CONFIG_MAIN_STACK_SIZE=8192

CONFIG_MESHTASTIC=y
CONFIG_MESHTASTIC_SETTINGS=y
CONFIG_MESHTASTIC_LOG_LEVEL_DBG=y
CONFIG_MESHTASTIC_PACKET_HEXDUMP=y

# for persistent settings
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
 # for delayed settings save in system work queue
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048