# Net-syslog delta — ship the Zephyr LOG stream off-box as RFC5424 syslog over UDP
# to an INTERNAL collector. Opt-in: chained LAST (after overlay-net.conf, and
# after overlay-ota.conf when OTA=1) by the justfile when NETLOG=1.
#
# SAFETY (LAW): the collector MUST be an internal-only endpoint — NEVER the public
# MQTT broker. These logs carry node ids, wifi/DHCP state, positions. RFC5424 carries
# native severity (DEBUG/INFO/WARN/ERROR), so a collector (rsyslog/Vector) can split
# by severity/host without any custom per-topic scheme on the node.

CONFIG_LOG_BACKEND_NET=y
# <collector-ip>:<port> — the RFC5737 TEST-NET placeholder below is not a real host.
# Set your own internal collector here, or override CONFIG_LOG_BACKEND_NET_SERVER in a
# local, gitignored file (e.g. prj-local.conf / *-local.conf); the Kconfig string is
# compile-time, so a change needs a rebuild.
CONFIG_LOG_BACKEND_NET_SERVER="192.0.2.1:514"
CONFIG_LOG_BACKEND_NET_MAX_BUF_SIZE=512
CONFIG_LOG_BACKEND_NET_AUTOSTART=y

# 2026-07-18 (stability investigation): measured via `kernel thread stacks` over telnet —
# the log-processing thread (drains the log queue, formats + dispatches to every backend
# incl. this one) was sitting at 1152/1152 = 100% used, ZERO bytes unused, on a live node.
# Under bursty mesh traffic (this backend ships a UDP packet for nearly every log line)
# that's one bad burst from a real overflow — and without STACK_SENTINEL that's silent
# DRAM corruption, not a clean fault. Bumped with real headroom, not a token nudge.
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
# Richer RFC5424 structured-data (uptime/seq) so the collector can order/dedupe.
CONFIG_LOG_BACKEND_NET_RFC5424_STRUCTURED_DATA=y

# The backend needs one more UDP net context/socket on top of MQTT-TLS + telnet:23 +
# SMP/UDP:1337 + DHCP + DNS. Bump the ceiling so we don't starve an existing socket.
CONFIG_NET_MAX_CONTEXTS=12
# net_conn tracks BOTH TCP+UDP conn-match entries; base net set 8. The syslog UDP
# socket on top of MQTT-TLS+telnet+SMP+DHCP+DNS exhausted it -> net_conn_register -2
# -> PhoneAPI:4403 accept() refused (SMP+syslog kept working). Bump to clear it.
CONFIG_NET_MAX_CONN=16

# Tame the flood live: `log backend "log_backend_net" level <1..4>` from the shell
# (1=ERR .. 4=DBG). Lets us default quiet and turn DEBUG on only when chasing a bug.
CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_NETWORKING=y

# 2026-07-18 (stability investigation, cont.): three more thread stacks measured close to
# the wall via `kernel thread stacks` — not yet at zero like the logging thread above, but
# high enough that we don't want to keep firefighting them one crash at a time. Doubled
# each (operator call: stop reacting to overflows one at a time, buy real headroom now).
# Not netlog-specific — co-located here since this is where the other measured stack fix
# lives. Costs ~7 KB combined; both boards had room for it.
# meshtastic_tcp: was 4096 (Kconfig default), measured 86% used
CONFIG_MESHTASTIC_TCP_THREAD_STACK_SIZE=8192
# mcumgr smp: was 2048 (Zephyr default), measured 57-69% used
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4096
# smp_udp4: was 1024 (Zephyr default), measured 70% used
CONFIG_MCUMGR_TRANSPORT_UDP_STACK_SIZE=2048
