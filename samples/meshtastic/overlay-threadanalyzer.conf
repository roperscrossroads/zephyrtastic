# Thread analyzer — periodic per-thread stack high-water-mark logging, for a stack-sizing
# soak. Opt-in via TA=1 (a diagnostic, not part of a normal deployment). It selects
# INIT_STACKS + THREAD_MONITOR + THREAD_STACK_INFO (already on here), so it adds only the
# periodic reporter thread (~1 KB) + a little code.
#
# Reports go to the LOG backend, so with NETLOG=1 they land at the syslog collector. The
# "unused" figure each report prints is the deepest the stack reached since boot (the
# INIT_STACKS 0xAA pattern, overwritten as the stack grows) — i.e. the true high-water-mark.
# `kernel thread stacks` reads the same thing on demand.
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_USE_LOG=y
# Every 5 min — catches peaks over a soak without spamming netlog.
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=300
